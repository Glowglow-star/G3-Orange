<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StopAtlas — Map</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg: #f5f3ee;
    --paper: #faf9f6;
    --ink: #424242;
    --ink-light: #6b6860;
    --rule: #d6d3cc;
    --accent: #ba554a;
    --accent-warm: #e67e22;
    --teal: #1a7a6e;
    --surface: #edeae3;
  }

  body { margin:0; font-family:'DM Sans', sans-serif; background:var(--bg); }

  .masthead {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--ink);
    padding: 0 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    z-index:1000;
  }

  .masthead-logo img { height: 20px; }

  .masthead-nav { display:flex; gap:28px; }

  .masthead-nav a {
    display:flex; align-items:center; height:60px;
    font-size:12px; color:rgba(245,243,238,0.55);
    text-decoration:none;
  }

  .masthead-nav a.active { color:white; }

  #map {
    position:absolute;
    top:60px;
    bottom:0;
    width:100%;
  }

  .control-panel {
    position:absolute;
    top:80px;
    left:20px;
     background: rgba(251, 243, 232, 0.9);  /* paper 色 */
    backdrop-filter: blur(6px);
    border: 1px solid var(--rule);
    padding:16px;
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    z-index:1000;
    font-size:12px;
  }

  .control-panel label {
    display:block;
    margin-bottom:8px;
  }
.control-panel input[type="range"] {
  -webkit-appearance: none;
  width: 160px;
  height: 10px;
  background: linear-gradient(
    to right,
    rgba(199,124,63,0.35) 0%,                 /* 淡橙 */
    rgba(199,124,63,0.35) var(--value, 50%),  /* 已选 */
    var(--rule) var(--value, 50%),            /* 未选 */
    var(--rule) 100%
  );
  border-radius: 5px;
  outline:#6b6860;
}

/* 滑块 */
.control-panel input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  background: var(--accent);   /* 只这里变橙色 */
  border-radius: 50%;
  cursor: pointer;
  border: none;
  
}

/* Firefox */
.control-panel input[type="range"]::-moz-range-thumb {
  background: var(--accent);
  border: none;
  border-radius: 50%;
}

  .leaflet-tile {
  filter: 
    grayscale(85%)
    brightness(1.05)
    contrast(0.9)
    sepia(15%);
}
</style>
</head>

<body>

<div class="masthead">
  <div class="masthead-logo"><img src="logo1.png"></div>
  <nav class="masthead-nav">
    <a href="index.html">Home</a>
    <a href="map.html" class="active">Map</a>
    <a href="analysis.html">Analysis</a>
    <a href="resources.html">Resources</a>
  </nav>
</div>

<div id="map"></div>

<div class="control-panel">
  <label>
    Radius scale
    <input type="range" id="radiusSlider" min="2" max="20" value="6">
  </label>
</div>

<script>
const map = L.map('map', {
  zoomControl: false   
}).setView([37.75, -122.42], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = [];
let dataRows = [];

function getColor(count, max) {
  const t = count / max;

  const r = 210 + t * 20;
  const g = 140 + t * 10;
  const b = 80  - t * 10;

  return `rgb(${r},${g},${b})`;
}

function renderMarkers(radiusScale = 6) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const max = Math.max(...dataRows.map(d => +d.stop_count || 1));

  dataRows.forEach(d => {
    const lat = +d.lat;
    const lng = +d.lng;
    const count = +d.stop_count || 1;

    if (!lat || !lng) return;

    const marker = L.circleMarker([lat, lng], {
      radius: Math.sqrt(count / max) * radiusScale,
      fillColor: '#c77c3f',
      fillOpacity: 0.35,
      color: 'transparent'
    })
    .bindPopup(`<b>${d.location}</b><br>Stops: ${count}`)
    .addTo(map);

    markers.push(marker);
  });
}

function parseCSV(text) {
  const rows = text.split('\n').map(r => r.split(','));
  const headers = rows.shift();
  return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

async function loadData() {
  const text = await fetch('table_geo.csv').then(r => r.text());
  dataRows = parseCSV(text);
  renderMarkers();
}

loadData();

// slider interaction
const slider = document.getElementById('radiusSlider');
slider.addEventListener('input', e => {
  renderMarkers(e.target.value);
});

function updateSliderFill() {
  const percent = (slider.value - slider.min) / (slider.max - slider.min) * 100;
  slider.style.setProperty('--value', percent + '%');
}

slider.addEventListener('input', updateSliderFill);
updateSliderFill();
</script>

</body>
</html>
